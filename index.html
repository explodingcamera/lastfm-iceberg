<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Last.fm Iceberg Chart Generator</title>
    <link
      rel="icon"
      href="./favicon-dark.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      href="./favicon-light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="canonical" href="https://lastfm-iceberg.dawdle.space/" />
    <meta
      name="description"
      content="Generate a Last.fm iceberg chart from your top artists, albums, or tracks, grouped by listener count. Free tool hosted on dawdle.space."
    />
    <meta
      property="og:description"
      content="Generate an iceberg chart from your Last.fm top artists, albums, or tracks."
    />
    <meta property="og:title" content="Last.fm Iceberg Chart Generator" />
    <meta property="og:site_name" content="dawdle.space" />
    <meta name="application-name" content="Last.fm Iceberg Chart Generator" />
    <meta property="og:url" content="https://lastfm-iceberg.dawdle.space/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Last.fm Iceberg Chart Generator" />
    <meta
      name="twitter:description"
      content="Generate an iceberg chart from your Last.fm top artists, albums, or tracks."
    />
    <link rel="stylesheet" href="./style.css?v=3" />
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link
      href="https://fonts.bunny.net/css?family=dm-mono:300,500"
      rel="stylesheet"
    />
    <link rel="preload" href="./images/iceberg.jpg" as="image" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Last.fm Iceberg Chart Generator",
        "url": "https://lastfm-iceberg.dawdle.space/",
        "description": "Generate a Last.fm iceberg chart from your top artists, albums, or tracks, grouped by listener count.",
        "applicationCategory": "EntertainmentApplication",
        "operatingSystem": "Web",
        "isAccessibleForFree": true,
        "creator": {
          "@type": "Organization",
          "name": "dawdle.space",
          "url": "https://dawdle.space/"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        }
      }
    </script>
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <main>
      <section id="form-screen" class="screen active">
        <h1><span class="lastfm">last.fm</span> iceberg chart generator</h1>
        <p>
          Generate an
          <a href="https://knowyourmeme.com/memes/iceberg-tiers-parodies"
            >iceberg chart</a
          >
          based on your most played artists, albums or tracks and their
          respective listener count.
        </p>
        <form id="form">
          <fieldset>
            <label
              >Last.fm username
              <input name="user" required />
            </label>
            <label
              >Data to plot
              <select name="mode">
                <option value="artists" selected>Artists</option>
                <option value="albums">Albums</option>
                <option value="tracks">Tracks</option>
              </select>
            </label>
          </fieldset>
          <fieldset>
            <label
              >Date period
              <select name="period">
                <option value="7day">Week</option>
                <option value="1month">Month</option>
                <option value="3month">3 months</option>
                <option value="6month">6 months</option>
                <option value="12month">Year</option>
                <option value="overall" selected>Overall</option>
              </select>
            </label>
            <label
              >Number of results
              <input type="number" name="amount" min="5" max="100" value="25" />
            </label>
          </fieldset>
          <label class="checkbox-label"
            >Include guest appearances
            <input type="checkbox" name="filter" />
          </label>
          <input id="submit" type="submit" value="Generate" />
        </form>
        <p id="error"></p>
      </section>

      <section id="loading-screen" class="screen" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <p id="message">
          Generating, please wait... This will take a few seconds.
        </p>
      </section>

      <section id="result-screen" class="screen">
        <div class="actions">
          <button id="back" type="button">&lt; Settings</button>
          <button id="download" type="button">Download</button>
        </div>
        <ul id="results">
          <li class="result"></li>
          <li class="result"></li>
          <li class="result"></li>
          <li class="result"></li>
          <li class="result"></li>
          <li class="result"></li>
          <li class="result"></li>
        </ul>
      </section>
    </main>

    <footer class="site-links">
      <a href="https://dawdle.space/">hosted on dawdle.space</a>
      <a href="https://github.com/explodingcamera/lastfm-iceberg"
        >source code</a
      >
    </footer>

    <noscript>This page requires JavaScript to work.</noscript>
    <script
      type="module"
      data-entity="lastfm"
      src="https://a.explodingcamera.com/script.js"
    ></script>
  </body>
</html>
